name: Codex Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

# Prevent concurrent reviews on the same PR
concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate secrets
        run: |
          set -eu
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "::error::OPENAI_API_KEY secret is not set"
            exit 1
          fi
          echo "✓ Required secrets are configured"

      - name: Run Codex Code Review
        id: codex-review
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          echo "🤖 Running Codex code review..."

          # Get PR diff
          PR_DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})

          # Get PR details
          PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json title -q '.title')
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json body -q '.body')

          # Load repository conventions from CLAUDE.md if present
          CONVENTIONS=""
          if [ -f "CLAUDE.md" ]; then
            CONVENTIONS=$(cat CLAUDE.md)
          fi

          # Prepare the review prompt
          REVIEW_PROMPT="You are an expert code reviewer. Review this pull request and provide feedback on:
          - Code quality and best practices
          - Potential bugs or issues
          - Performance considerations
          - Security concerns
          - Test coverage

          Use the repository's conventions (below) for guidance on style and conventions. Be constructive and helpful in your feedback.

          Repository Conventions (CLAUDE.md):
          $CONVENTIONS

          PR Title: $PR_TITLE

          PR Description: $PR_BODY

          Code Changes (diff):
          $PR_DIFF

          Please provide a comprehensive code review with specific, actionable feedback. Format your response in Markdown."

          # Call OpenAI API using GPT-5.1-codex-max (Codex)
          REVIEW_RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$(jq -n \
              --arg prompt "$REVIEW_PROMPT" \
              '{
                model: "gpt-5.1-codex-max",
                messages: [
                  {role: "system", content: "You are an expert code reviewer providing constructive feedback on pull requests."},
                  {role: "user", content: $prompt}
                ],
                temperature: 0.3,
                max_tokens: 4096
              }')" | jq -r '.choices[0].message.content // "Error: Failed to get response from OpenAI API"')

          if [ -z "$REVIEW_RESPONSE" ] || [ "$REVIEW_RESPONSE" = "Error: Failed to get response from OpenAI API" ]; then
            echo "::error::Codex review returned no content"
            exit 1
          fi

          # Post comment to PR
          COMMENT_BODY="## 🤖 Codex (GPT-5.1-codex-max) Code Review

          $REVIEW_RESPONSE"

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT_BODY"

          echo "✅ Codex code review completed successfully"

      - name: Check for Claude OAuth Token
        id: check-claude
        if: steps.codex-review.outcome == 'failure'
        run: |
          if [ -n "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN secret is not configured. Skipping Claude fallback."
          fi

      - name: Fallback to Claude Code Review
        id: claude-review
        if: steps.codex-review.outcome == 'failure' && steps.check-claude.outputs.has_key == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Codex code review failed; please provide a fallback review of this pull request with feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Prefix your review comment with a note that this is a Claude fallback review because Codex encountered an issue.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

      - name: Report failure
        if: steps.codex-review.outcome == 'failure' && steps.claude-review.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Code Review encountered an error. Both Codex (GPT-5.1-codex-max) and Claude reviews failed. Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })
